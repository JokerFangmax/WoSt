<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Boundary Bias Detector 3D</title>
  <style>
    :root {
      color-scheme: light;
      --panel: rgba(255, 255, 255, 0.93);
      --line: rgba(15, 23, 42, 0.16);
      --text: #111827;
      --muted: #64748B;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      overflow: hidden;
      font-family: Segoe UI, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      background: #F8FAFC;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: grab;
      touch-action: none;
    }
    canvas:active { cursor: grabbing; }
    .panel {
      position: fixed;
      left: 16px;
      top: 16px;
      width: min(390px, calc(100vw - 32px));
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.12);
      backdrop-filter: blur(10px);
    }
    .title {
      margin: 0 0 8px;
      font-size: 15px;
      font-weight: 700;
    }
    .meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px 12px;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }
    .row {
      display: grid;
      grid-template-columns: 92px 1fr;
      align-items: center;
      gap: 8px;
      margin: 8px 0;
      font-size: 13px;
    }
    select, input[type="range"] {
      width: 100%;
      accent-color: #2563EB;
    }
    select {
      height: 30px;
      border: 1px solid rgba(15, 23, 42, 0.18);
      border-radius: 6px;
      background: #FFFFFF;
      color: var(--text);
      font: inherit;
      font-size: 13px;
    }
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 10px;
      margin-top: 10px;
      font-size: 13px;
    }
    label {
      display: flex;
      align-items: center;
      gap: 7px;
      min-width: 0;
      white-space: nowrap;
    }
    input[type="checkbox"] {
      width: 15px;
      height: 15px;
      margin: 0;
      accent-color: #2563EB;
    }
    button {
      height: 30px;
      border: 1px solid rgba(37, 99, 235, 0.35);
      border-radius: 6px;
      background: #EFF6FF;
      color: #1D4ED8;
      font: inherit;
      font-size: 13px;
    }
    .hint {
      margin-top: 9px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }
    .scale {
      position: fixed;
      left: 16px;
      bottom: 16px;
      width: min(360px, calc(100vw - 32px));
      padding: 9px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.10);
      font-size: 12px;
      color: var(--muted);
    }
    .bar {
      height: 11px;
      margin: 6px 0;
      border-radius: 999px;
      background: linear-gradient(90deg, #440154, #31688E, #35B779, #FDE725);
      border: 1px solid rgba(15, 23, 42, 0.14);
    }
    .scale-labels {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body>
  <canvas id="view"></canvas>
  <section class="panel" aria-label="Viewer controls">
    <h1 class="title">Boundary Bias Detector 3D</h1>
    <div class="meta" id="meta"></div>
    <div class="row">
      <span>Field</span>
      <select id="field"></select>
    </div>
    <div class="row">
      <span>Point size</span>
      <input id="pointSize" type="range" min="1" max="8" step="0.5" value="3">
    </div>
    <div class="row">
      <span>Threshold</span>
      <input id="threshold" type="range" min="0" max="0.98" step="0.01" value="0">
    </div>
    <div class="controls">
      <label><input type="checkbox" data-toggle="logScale" checked>Log color</label>
      <label><input type="checkbox" data-toggle="mesh" checked>Mesh surface</label>
      <label><input type="checkbox" data-toggle="meshWire">Mesh wire</label>
      <label><input type="checkbox" data-toggle="cube" checked>Outer cube</label>
      <label><input type="checkbox" data-toggle="points" checked>Bias points</label>
      <button id="reset" type="button">Reset view</button>
    </div>
    <div class="hint">Drag to rotate. Wheel to zoom. Threshold filters out low-valued points for the selected field; the old PNG is only the center z-slice.</div>
  </section>
  <div class="scale">
    <div id="scaleTitle"></div>
    <div class="bar"></div>
    <div class="scale-labels"><span id="scaleMin"></span><span id="scaleMax"></span></div>
  </div>

    window.addEventListener("resize", resize);
    resize();
    render();
