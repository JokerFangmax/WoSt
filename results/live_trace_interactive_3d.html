<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WoSt Interactive 3D Trace</title>
  <style>
    :root {
      color-scheme: light;
      --panel: rgba(255, 255, 255, 0.92);
      --line: rgba(15, 23, 42, 0.16);
      --text: #111827;
      --muted: #64748B;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      overflow: hidden;
      font-family: Segoe UI, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      background: #F8FAFC;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: grab;
      touch-action: none;
    }
    canvas:active { cursor: grabbing; }
    .panel {
      position: fixed;
      left: 16px;
      top: 16px;
      width: min(360px, calc(100vw - 32px));
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.12);
      backdrop-filter: blur(10px);
    }
    .title {
      margin: 0 0 8px;
      font-size: 15px;
      font-weight: 700;
    }
    .meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px 12px;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 10px;
      font-size: 13px;
    }
    .timeline {
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      align-items: center;
      gap: 8px;
      margin: 10px 0 9px;
    }
    .timeline button {
      width: 58px;
    }
    .timeline input[type="range"] {
      width: 100%;
      accent-color: #2563EB;
    }
    .timeline select {
      height: 30px;
      border: 1px solid rgba(15, 23, 42, 0.18);
      border-radius: 6px;
      background: #FFFFFF;
      color: var(--text);
      font: inherit;
      font-size: 13px;
    }
    .step-readout {
      min-width: 76px;
      text-align: right;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }
    label {
      display: flex;
      align-items: center;
      gap: 7px;
      min-width: 0;
      white-space: nowrap;
    }
    input[type="checkbox"] {
      width: 15px;
      height: 15px;
      margin: 0;
      accent-color: #2563EB;
    }
    button {
      height: 30px;
      border: 1px solid rgba(37, 99, 235, 0.35);
      border-radius: 6px;
      background: #EFF6FF;
      color: #1D4ED8;
      font: inherit;
      font-size: 13px;
    }
    .hint {
      margin-top: 9px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }
    .legend {
      position: fixed;
      left: 16px;
      bottom: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      max-width: calc(100vw - 32px);
      padding: 9px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.10);
      font-size: 12px;
      color: var(--muted);
    }
    .key { display: inline-flex; align-items: center; gap: 6px; }
    .swatch {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1px solid rgba(15, 23, 42, 0.35);
    }
  </style>
</head>
<body>
  <canvas id="view"></canvas>
  <section class="panel" aria-label="Viewer controls">
    <h1 class="title">WoSt interactive 3D trace</h1>
    <div class="meta" id="meta"></div>
    <div class="timeline">
      <button id="play" type="button">Play</button>
      <input id="frame" type="range" min="0" value="0" step="1">
      <span class="step-readout" id="stepReadout"></span>
      <select id="speed" aria-label="Animation speed">
        <option value="0.5">0.5x</option>
        <option value="1" selected>1x</option>
        <option value="2">2x</option>
        <option value="4">4x</option>
      </select>
    </div>
    <div class="controls">
      <label><input type="checkbox" data-toggle="mesh" checked>Mesh surface</label>
      <label><input type="checkbox" data-toggle="meshWire" checked>Mesh wire</label>
      <label><input type="checkbox" data-toggle="cube" checked>Outer cube</label>
      <label><input type="checkbox" data-toggle="trace" checked>Walk paths</label>
      <label><input type="checkbox" data-toggle="events" checked>Event points</label>
      <label><input type="checkbox" data-toggle="sphereSteps">Sphere points</label>
      <button id="reset" type="button">Reset view</button>
    </div>
    <div class="hint">Drag to rotate. Wheel to zoom. The mesh is the inner boundary; the cube is the outer Dirichlet boundary.</div>
  </section>
  <div class="legend" id="legend"></div>

        state.speed = Number(event.target.value) || 1;
      });
      document.querySelectorAll("input[data-toggle]").forEach((input) => {
        input.addEventListener("change", () => {
          state[input.dataset.toggle] = input.checked;
          render();
        });
      });
      document.getElementById("reset").addEventListener("click", () => {
        state.rot = [0.731689, -0.277945, -0.622397, 0.000000, 0.913089, -0.407760, 0.681639, 0.298354, 0.668097];
        state.zoom = 1.0;
        render();
      });
    }

    let dragging = false;
    let lastX = 0;
    let lastY = 0;
    canvas.addEventListener("pointerdown", (event) => {
      dragging = true;
      lastX = event.clientX;
      lastY = event.clientY;
      canvas.setPointerCapture(event.pointerId);
    });
    canvas.addEventListener("pointermove", (event) => {
      if (!dragging) return;
      const dx = event.clientX - lastX;
      const dy = event.clientY - lastY;
      lastX = event.clientX;
      lastY = event.clientY;
      const sensitivity = 0.008;
      const ry = rot_y(dx * sensitivity);
      const rx = rot_x(dy * sensitivity);
      state.rot = mat3_mul(ry, mat3_mul(rx, state.rot));
      render();
    });
    canvas.addEventListener("pointerup", () => { dragging = false; });
    canvas.addEventListener("pointercancel", () => { dragging = false; });
    canvas.addEventListener("wheel", (event) => {
      event.preventDefault();
      state.zoom = Math.max(0.18, Math.min(8, state.zoom * Math.exp(-event.deltaY * 0.001)));
      render();
    }, { passive: false });

    initText();
    bindControls();
    window.addEventListener("resize", resize);
    resize();
    render();
  </script>
</body>
</html>
