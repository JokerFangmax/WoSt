threads: 8
pilot_samples: 16
min_samples: 16
max_samples: 256
batch_size: 16
run_zombie: false
run_bvh: true
run_geometry_analysis: true
run_path_debugger: true
run_optimization: true
live_point: [0.05, 0.02, 0.08]
output: experiments/bunny_quick
